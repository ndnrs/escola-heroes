<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escola Heroes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <!-- Phaser 3 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

    <!-- Game scripts (ordem importa!) -->
    <script src="src/constants.js"></script>

    <!-- Entidades -->
    <script src="src/entities/Player.js"></script>
    <script src="src/entities/Projectile.js"></script>
    <script src="src/entities/Monster.js"></script>
    <script src="src/entities/MonsterTypes.js"></script>
    <script src="src/entities/PowerUp.js"></script>

    <!-- UI -->
    <script src="src/ui/HealthBar.js"></script>
    <script src="src/ui/SpecialBar.js"></script>
    <script src="src/ui/VirtualJoystick.js"></script>
    <script src="src/ui/MobileButtons.js"></script>

    <!-- Systems -->
    <script src="src/systems/AudioManager.js"></script>
    <script src="src/systems/WaveManager.js"></script>

    <!-- Scenes -->
    <script src="src/scenes/BootScene.js"></script>
    <script src="src/scenes/MenuScene.js"></script>
    <script src="src/scenes/HowToPlayScene.js"></script>
    <script src="src/scenes/SelectScene.js"></script>
    <script src="src/scenes/CantinScene.js"></script>
    <script src="src/scenes/GymScene.js"></script>
    <script src="src/scenes/ClassroomScene.js"></script>
    <script src="src/scenes/BossScene.js"></script>
    <script src="src/scenes/VictoryScene.js"></script>
    <script src="src/scenes/LevelCompleteScene.js"></script>
    <script src="src/scenes/GameOverScene.js"></script>
    <script src="src/scenes/HUDScene.js"></script>
    <script src="src/scenes/TestScene.js"></script>

    <!-- Main (ultimo!) -->
    <script src="src/main.js"></script>
</body>
</html>
